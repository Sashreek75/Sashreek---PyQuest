
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyQuest - Learn Python, for real.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-warm: #faf8f5;
            --text-main: #1a1714;
            --accent-yellow: #f5c842;
            --line-color: rgba(26, 23, 20, 0.05);
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-warm);
            color: var(--text-main);
            overflow-x: hidden;
            scroll-behavior: smooth;
            position: relative;
        }

        /* Grain Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 9999;
        }

        /* Subtle Grid Background */
        .grid-bg {
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--line-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        .font-serif {
            font-family: 'DM Serif Display', serif;
        }
        
        .code-font {
            font-family: 'JetBrains Mono', monospace;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #faf8f5;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(26, 23, 20, 0.1);
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(26, 23, 20, 0.2);
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Editorial Utilities */
        .rail-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 10px;
            font-weight: 700;
            color: rgba(26, 23, 20, 0.3);
        }

        .oversized-number {
            font-family: 'DM Serif Display', serif;
            font-size: 120px;
            line-height: 0.8;
            color: rgba(26, 23, 20, 0.03);
            user-select: none;
        }

        .paper-shadow {
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1),
                        0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "path": "https://esm.sh/path@^0.12.7",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
<body class="bg-[#faf8f5]">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
